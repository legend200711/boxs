<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Icons</title>
<style>body{background:#03060d;color:#ddeeff;font-family:sans-serif;padding:20px;}
button{background:#1e90ff;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;margin:4px;}
button:hover{filter:brightness(1.2);}
#status{margin-top:12px;font-size:13px;color:#6a88aa;}
canvas{display:none;}
</style></head>
<body>
<h2>🌑 Shadow Nexus — Icon Generator</h2>
<p style="color:#6a88aa;font-size:13px;">Click the button below to auto-download all required PWA icon sizes.</p>
<button onclick="generateAll()">⬇️ Download All Icons</button>
<div id="status"></div>
<canvas id="c"></canvas>
<script>
const SIZES = [72, 96, 128, 144, 152, 192, 384, 512];

const SVG = (size) => `
<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#03060d"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#1e90ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1e90ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="256" cy="215" rx="200" ry="180" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Hurricane ring 1 -->
  <path d="M256,256 m-160,0 a160,160 0 0,1 160,-160" fill="none" stroke="#1e90ff" stroke-width="18" stroke-opacity="0.25" stroke-linecap="round"/>
  <!-- Hurricane ring 2 -->
  <path d="M256,256 m-120,0 a120,120 0 0,1 120,-120" fill="none" stroke="#1e90ff" stroke-width="14" stroke-opacity="0.3" stroke-linecap="round"/>
  <!-- Hurricane ring 3 -->
  <path d="M256,256 m-80,0 a80,80 0 0,1 80,-80" fill="none" stroke="#00c8ff" stroke-width="10" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Moon crescent -->
  <circle cx="256" cy="224" r="88" fill="#0a1628"/>
  <circle cx="256" cy="224" r="80" fill="none" stroke="#1e90ff" stroke-width="3" stroke-opacity="0.6"/>
  <circle cx="298" cy="204" r="72" fill="#03060d"/>
  <!-- Stars -->
  <circle cx="200" cy="180" r="3" fill="#00c8ff" opacity="0.9"/>
  <circle cx="320" cy="200" r="2.5" fill="#1e90ff" opacity="0.8"/>
  <circle cx="175" cy="260" r="2" fill="#00c8ff" opacity="0.7"/>
  <circle cx="340" cy="155" r="2" fill="#ddeeff" opacity="0.6"/>
  <circle cx="230" cy="150" r="1.8" fill="#ddeeff" opacity="0.7"/>
  <!-- S letter / glyph -->
  <text x="256" y="310" font-family="Arial,sans-serif" font-size="90" font-weight="900"
        text-anchor="middle" fill="#1e90ff" opacity="0.9"
        style="filter:drop-shadow(0 0 12px #1e90ff)">S</text>
  <!-- Bottom glow line -->
  <rect x="156" y="360" width="200" height="3" rx="2" fill="#1e90ff" opacity="0.4"/>
</svg>`;

async function generateAll() {
  const status = document.getElementById('status');
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  status.textContent = 'Generating icons…';

  for (const size of SIZES) {
    await new Promise(resolve => {
      canvas.width = size;
      canvas.height = size;
      const blob = new Blob([SVG(size)], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
        canvas.toBlob(pngBlob => {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(pngBlob);
          a.download = `icon-${size}.png`;
          a.click();
          setTimeout(() => URL.revokeObjectURL(a.href), 1000);
          status.textContent = `✅ icon-${size}.png downloaded`;
          setTimeout(resolve, 300);
        }, 'image/png');
      };
      img.src = url;
    });
  }
  status.textContent = '🎉 All icons downloaded! Place them in the same folder as the HTML file.';
}
</script>
</body>
</html>
